# The backend's DB connection string, kept separate from its non-sensitive
# config (see configmap.yaml) because it embeds the Postgres password.
#
# HONEST CAVEAT: this duplicates the credentials already in
# k8s/postgres/secret.yaml. Kubernetes has no built-in way to compose a
# connection-string env var out of another Secret's individual keys, and
# writing a wrapper script just to avoid a few duplicated characters isn't
# worth it for a local learning project with a throwaway dev password. If this
# ever points at a real database, both secrets move to a proper secret manager
# and this trade-off gets revisited.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: job-hunter
type: Opaque
stringData:
  # `postgres` is the headless Service's DNS name (see k8s/postgres/service.yaml)
  # — any pod in this namespace can reach the database at that hostname.
  DATABASE_URL: postgresql+psycopg://jobhunter:devpassword@postgres:5432/jobhunter
