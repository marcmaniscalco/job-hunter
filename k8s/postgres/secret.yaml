# A Secret stores sensitive values (here: the Postgres credentials) separately
# from the pod definition. The pod references them by name, so passwords never
# appear in the StatefulSet spec.
#
# HONEST CAVEAT: Kubernetes Secrets are only base64-*encoded*, not encrypted, and
# committing them to git is bad practice. This one holds a throwaway local-dev
# password, so it's fine for learning. In Phase 5 (or the moment this touches a
# real database) we switch to a proper secret manager and remove this from git.
#
# `stringData` lets us write plain text; Kubernetes base64-encodes it for us.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: job-hunter
type: Opaque
stringData:
  POSTGRES_USER: jobhunter
  POSTGRES_PASSWORD: devpassword
  POSTGRES_DB: jobhunter
