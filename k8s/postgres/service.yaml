# A Service gives our database a stable DNS name inside the cluster.
#
# Pods are cattle: they get new IP addresses when they restart. A Service is a
# fixed front door. Any pod in this namespace can connect to the database at the
# hostname `postgres` (or fully qualified: postgres.job-hunter.svc.cluster.local),
# and Kubernetes routes that to whichever pod is currently backing it.
#
# `clusterIP: None` makes this a "headless" service. StatefulSets require one:
# instead of load-balancing across many pods (there's only one DB anyway), it
# gives each pod a stable, individually-addressable DNS name like
# `postgres-0.postgres`. That stable identity is the whole point of a StatefulSet.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: job-hunter
  labels:
    app: postgres
spec:
  clusterIP: None
  selector:
    app: postgres        # routes to pods carrying this label
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
